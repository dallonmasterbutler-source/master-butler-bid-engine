# MASTER BUTLER — Render deployment blueprint (PREPARED, NOT YET DEPLOYED)
#
# Deploying this puts the office dashboard on the internet so LaRee,
# Martha, and Jessica can open it from their own machines.
#
# DO NOT DEPLOY until (with Dallon at the keyboard):
#   1. DASHBOARD_PASSWORD is set below (the app refuses to start
#      publicly without it — enforced in code)
#   2. Secrets (.env values) are entered in the Render dashboard as
#      environment variables — the .env file itself is never uploaded
#   3. The Postgres schema (schema.sql) is applied to the Render database
#
# Estimated cost after free tier: web ~$7/mo + Postgres ~$7/mo.

services:
  - type: web
    name: masterbutler-dashboard
    runtime: python
    plan: free               # pilot; upgrade when the office relies on it
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python3 render_start.py"
    envVars:
      - key: DASHBOARD_PASSWORD
        sync: false          # entered in Render, never in git
      - key: DATABASE_URL
        sync: false          # from the master-butler-db connection info
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: JOBBER_CLIENT_ID
        sync: false
      - key: JOBBER_CLIENT_SECRET
        sync: false

# database: master-butler-db already exists in the workspace
# (created by Dallon, free plan — converts ~$7/mo after Sept 2026)
